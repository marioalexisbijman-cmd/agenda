<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Agendas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 id="form-title" class="text-2xl font-bold mb-6 text-center text-blue-900">Iniciar Sesión</h2>
        
        <form id="auth-form" class="space-y-4">
            <div id="name-field" class="hidden">
                <label class="block text-gray-700">Nombre Completo</label>
                <input type="text" id="nombre" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Tu nombre">
            </div>

            <div>
                <label class="block text-gray-700">Correo Electrónico</label>
                <input type="email" id="email" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="correo@ejemplo.com">
            </div>

            <div>
                <label class="block text-gray-700">Contraseña</label>
                <input type="password" id="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Mínimo 6 caracteres">
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-blue-800 text-white py-2 rounded-lg font-semibold hover:bg-blue-900 transition">
                Ingresar
            </button>
        </form>

        <p class="text-center text-sm text-gray-600 mt-4">
            <span id="toggle-text">¿No tienes cuenta comercial?</span>
            <a href="#" id="toggle-link" class="text-blue-700 font-semibold hover:underline">Regístrate aquí</a>
        </p>
    </div>

    <script>
        // Dirección corregida sin errores de tipeo
        const SUPABASE_URL = "https://kpkrIloxsubacruoxqlz.supabase.co";
        // Recuerda que aquí debes mantener tu clave secreta real de Supabase
        const SUPABASE_ANON_KEY = "sb_publishable_1zDD5Pgu92My50gkOHlt7Q_Dj1pjv5f";

        let isRegister = false;

        const formTitle = document.getElementById('form-title');
        const nameField = document.getElementById('name-field');
        const submitBtn = document.getElementById('submit-btn');
        const toggleText = document.getElementById('toggle-text');
        const toggleLink = document.getElementById('toggle-link');
        const authForm = document.getElementById('auth-form');

        // Alternar entre Iniciar Sesión y Registrarse
        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isRegister = !isRegister;
            
            if (isRegister) {
                formTitle.textContent = "Crear Cuenta Profesional";
                nameField.classList.remove('hidden');
                document.getElementById('nombre').required = true;
                submitBtn.textContent = "Registrarme e Iniciar";
                toggleText.textContent = "¿Ya tienes cuenta? ";
                toggleLink.textContent = "Inicia sesión";
            } else {
                formTitle.textContent = "Iniciar Sesión";
                nameField.classList.add('hidden');
                document.getElementById('nombre').required = false;
                submitBtn.textContent = "Ingresar";
                toggleText.textContent = "¿No tienes cuenta comercial? ";
                toggleLink.textContent = "Regístrate aquí";
            }
        });

        // Enviar el Formulario
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const nombre = document.getElementById('nombre').value;

            try {
                if (isRegister) {
                    // 1. Registrar usuario en la autenticación de Supabase
                    const signUpResponse = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_ANON_KEY
                        },
                        body: JSON.stringify({ email, password })
                    });

                    const signUpData = await signUpResponse.json();

                    if (!signUpResponse.ok) throw new Error(signUpData.msg || signUpData.error_description || 'Error en el registro');

                    // 2. Insertar los datos del profesional en la tabla pública
                    if (signUpData.user) {
                        const profileResponse = await fetch(`${SUPABASE_URL}/rest/v1/profesionales`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${signUpData.access_token}`,
                                'Prefer': 'return=minimal'
                            },
                            body: JSON.stringify({
                                id: signUpData.user.id,
                                nombre: nombre,
                                email: email
                            })
                        });

                        if (!profileResponse.ok) {
                            const profileError = await profileResponse.json();
                            throw new Error(profileError.message || 'Error al guardar el perfil');
                        }
                    }

                    alert('¡Cuenta creada con éxito!');
                    window.location.href = 'reserva.html';

                } else {
                    // Iniciar Sesión convencional
                    const loginResponse = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_ANON_KEY
                        },
                        body: JSON.stringify({ email, password })
                    });

                    const loginData = await loginResponse.json();

                    if (!loginResponse.ok) throw new Error(loginData.error_description || 'Correo o contraseña incorrectos');

                    // Guardar token y entrar
                    localStorage.setItem('supabase_token', loginData.access_token);
                    window.location.href = 'reserva.html';
                }
            } catch (error) {
                alert('Error: ' + error.message);
                console.error(error);
            }
        });
    </script>
</body>
</html>
