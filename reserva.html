<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Mis Citas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-blue-900 text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Mi Panel de Agenda</h1>
            <button id="logout-btn" class="bg-red-600 hover:bg-red-700 px-4 py-1.5 rounded-lg text-sm font-medium transition">
                Cerrar Sesión
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 col-span-1">
            <h3 class="text-lg font-bold text-gray-800 mb-4">Mi Perfil</h3>
            <div class="space-y-2">
                <p class="text-sm text-gray-600"><strong>Email:</strong> <span id="prof-email">Cargando...</span></p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 col-span-2">
            <h3 class="text-lg font-bold text-gray-800 mb-4">Próximas Citas Agendadas</h3>
            <div id="citas-container" class="space-y-3">
                <p class="text-gray-500 text-sm">Buscando citas en la base de datos...</p>
            </div>
        </div>
    </main>

    <script>
        const sessionData = localStorage.getItem('supabase_session');

        if (!sessionData) {
            alert('No tienes acceso. Por favor inicia sesión primero.');
            window.location.href = 'index.html';
        } else {
            const session = JSON.parse(sessionData);
            // Mostrar email del usuario logueado en Supabase
            document.getElementById('prof-email').textContent = session.user?.email || 'Profesional';
            document.getElementById('citas-container').innerHTML = '<p class="text-gray-500 text-sm italic">Conectado correctamente a Supabase. No hay citas programadas.</p>';
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('supabase_session');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
